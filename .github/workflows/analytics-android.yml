name: Build Analytics APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Build Web Project
        run: npm run build -w @workspace/baqaa-analytics

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        run: |
          cd artifacts/baqaa-analytics
          npx cap sync android
          cd android
          mkdir -p capacitor-cordova-android-plugins
          touch capacitor-cordova-android-plugins/cordova.variables.gradle
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: baqaa-analytics-apk
          path: artifacts/baqaa-analytics/android/app/build/outputs/apk/debug/app-debug.apk
